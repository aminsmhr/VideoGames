<div class="container py-4">
    <h2 class="mb-3">Edit Game</h2>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" formControlName="title" />
      </div>

      <div class="mb-3">
        <label class="form-label">Platform</label>
        <input class="form-control" formControlName="platform" />
      </div>

      <div class="mb-3">
        <label class="form-label">Release Year</label>
        <input type="number" class="form-control" formControlName="releaseYear" />
      </div>
      
      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" class="form-control" formControlName="price" />
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-success" type="submit" [disabled]="form.invalid">Save</button>
        <button class="btn btn-outline-secondary" ngbTooltip="Go back to the list" type="button" (click)="back()">Back</button>
      </div>
    </form>
  </div>

  <ng-template #loading>
    <div class="container py-4 text-muted">Loading..</div>
  </ng-template>
